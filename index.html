<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Night Display</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #020717;
      --bg-1: #061533;
      --bg-2: #0a3162;
      --glow-a: 54, 153, 255;
      --glow-b: 99, 226, 255;
      --text: #e6f5ff;
      --muted: #9fbdd5;
      --quiet: #5d7f9c;
      --panel: rgba(5, 15, 34, 0.52);
      --panel-border: rgba(174, 224, 255, 0.16);
      --brightness: 0.72;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      isolation: isolate;
      filter: brightness(var(--brightness));
      transition: filter 240ms ease;
    }

    .sky {
      position: fixed;
      inset: 0;
      z-index: -4;
      background:
        radial-gradient(circle at 48% 45%, rgba(var(--glow-a), 0.16), transparent 34rem),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      position: fixed;
      inset: -24vmax;
      z-index: -3;
      content: "";
      pointer-events: none;
      filter: blur(62px);
      opacity: 0.52;
      mix-blend-mode: screen;
      transform-origin: 50% 52%;
    }

    .aurora {
      background:
        radial-gradient(ellipse at 20% 34%, rgba(var(--glow-b), 0.22), transparent 28%),
        radial-gradient(ellipse at 78% 28%, rgba(var(--glow-a), 0.2), transparent 30%),
        radial-gradient(ellipse at 54% 70%, rgba(30, 74, 170, 0.2), transparent 34%);
      animation: slow-turn 72s linear infinite;
    }

    .aurora::before {
      background:
        conic-gradient(from 80deg at 50% 52%, transparent, rgba(var(--glow-a), 0.2), transparent 34%, rgba(var(--glow-b), 0.16), transparent 70%);
      animation: slow-turn 118s linear infinite reverse;
    }

    .aurora::after {
      background:
        radial-gradient(ellipse at 45% 55%, rgba(108, 198, 255, 0.18), transparent 22%),
        radial-gradient(ellipse at 64% 40%, rgba(20, 116, 230, 0.16), transparent 26%);
      animation: drift 26s ease-in-out infinite alternate;
    }

    .room-scene {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.78;
    }

    .room-scene::before {
      position: absolute;
      inset: auto -8vw 0;
      height: 44vh;
      content: "";
      background:
        radial-gradient(ellipse at 50% 0%, rgba(67, 151, 255, 0.2), transparent 55%),
        linear-gradient(180deg, rgba(4, 13, 31, 0), rgba(1, 4, 13, 0.88) 42%, rgba(0, 0, 0, 0.96));
    }

    .room-window {
      position: absolute;
      top: clamp(1.2rem, 6vh, 4rem);
      left: clamp(1rem, 7vw, 6rem);
      width: clamp(13rem, 24vw, 23rem);
      height: clamp(15rem, 42vh, 29rem);
      border: 1px solid rgba(172, 224, 255, 0.14);
      border-radius: 16px 16px 6px 6px;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(169, 219, 255, 0.12) 50%, transparent calc(50% + 1px)),
        linear-gradient(180deg, transparent calc(58% - 1px), rgba(169, 219, 255, 0.1) 58%, transparent calc(58% + 1px)),
        radial-gradient(circle at 70% 18%, rgba(179, 221, 255, 0.18), transparent 12%),
        linear-gradient(180deg, rgba(9, 24, 55, 0.74), rgba(3, 10, 28, 0.78));
      box-shadow:
        inset 0 0 3rem rgba(82, 179, 255, 0.08),
        0 0 4rem rgba(31, 129, 226, 0.08);
    }

    .room-window::before {
      position: absolute;
      inset: 0;
      content: "";
      border-radius: inherit;
      background-image:
        linear-gradient(112deg, transparent 0 38%, rgba(161, 221, 255, 0.16) 39%, transparent 42%),
        repeating-linear-gradient(104deg, rgba(181, 232, 255, 0) 0 1.1rem, rgba(181, 232, 255, 0.13) 1.2rem 1.28rem);
      background-size: 100% 100%, 12rem 16rem;
      animation: rain-slide 11s linear infinite;
      opacity: 0.58;
    }

    .room-window::after {
      position: absolute;
      right: -1rem;
      bottom: -0.8rem;
      left: -1rem;
      height: 2.1rem;
      content: "";
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(25, 51, 82, 0.78), rgba(4, 10, 25, 0.88));
      box-shadow: 0 0.8rem 1.8rem rgba(0, 0, 0, 0.34);
    }

    .moon {
      position: absolute;
      top: 12%;
      right: 16%;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 50%;
      background: rgba(220, 246, 255, 0.72);
      box-shadow:
        0 0 1.2rem rgba(190, 232, 255, 0.42),
        0 0 4rem rgba(111, 186, 255, 0.26);
    }

    .building {
      position: absolute;
      bottom: 1.6rem;
      display: block;
      border-radius: 4px 4px 0 0;
      background:
        repeating-linear-gradient(180deg, rgba(158, 222, 255, 0.18) 0 0.16rem, transparent 0.18rem 0.72rem),
        linear-gradient(180deg, rgba(13, 38, 80, 0.85), rgba(2, 8, 24, 0.96));
      opacity: 0.8;
    }

    .building-one {
      left: 8%;
      width: 14%;
      height: 32%;
    }

    .building-two {
      left: 26%;
      width: 18%;
      height: 45%;
    }

    .building-three {
      right: 28%;
      width: 15%;
      height: 28%;
    }

    .building-four {
      right: 8%;
      width: 18%;
      height: 38%;
    }

    .shelf {
      position: absolute;
      top: clamp(5rem, 12vh, 9rem);
      right: clamp(1rem, 7vw, 5rem);
      display: flex;
      align-items: flex-end;
      gap: 0.55rem;
      width: clamp(10rem, 18vw, 17rem);
      height: 3.6rem;
      padding: 0 1rem 0.5rem;
      border-bottom: 0.35rem solid rgba(38, 72, 111, 0.62);
      opacity: 0.72;
    }

    .shelf span {
      display: block;
      width: 1.05rem;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, rgba(130, 199, 255, 0.34), rgba(12, 32, 67, 0.84));
    }

    .shelf span:nth-child(1) {
      height: 2.7rem;
    }

    .shelf span:nth-child(2) {
      height: 2rem;
      background: linear-gradient(180deg, rgba(255, 203, 122, 0.3), rgba(61, 43, 24, 0.75));
    }

    .shelf span:nth-child(3) {
      width: 3rem;
      height: 1.35rem;
    }

    .desk {
      position: absolute;
      right: clamp(1rem, 6vw, 5rem);
      bottom: 0;
      left: clamp(1rem, 6vw, 5rem);
      height: clamp(7rem, 18vh, 11rem);
      border-radius: 18px 18px 0 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent 18% 78%, rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, rgba(26, 51, 79, 0.74), rgba(4, 10, 24, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(197, 230, 255, 0.08),
        0 -1.8rem 5rem rgba(0, 0, 0, 0.22);
    }

    .lamp {
      position: absolute;
      right: clamp(4rem, 13vw, 12rem);
      bottom: 2rem;
      width: 4.8rem;
      height: 6.8rem;
    }

    .lamp::before {
      position: absolute;
      top: -3.8rem;
      left: 50%;
      width: 14rem;
      height: 14rem;
      content: "";
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 192, 101, 0.22), rgba(255, 192, 101, 0.06) 45%, transparent 70%);
      transform: translateX(-50%);
      animation: lamp-breathe 5.8s ease-in-out infinite;
    }

    .lamp-shade {
      position: absolute;
      top: 0.45rem;
      left: 0.7rem;
      width: 3.5rem;
      height: 1.8rem;
      border-radius: 1rem 1rem 0.3rem 0.3rem;
      background: linear-gradient(180deg, rgba(255, 209, 122, 0.92), rgba(119, 72, 42, 0.76));
      box-shadow: 0 0 1.6rem rgba(255, 186, 93, 0.3);
    }

    .lamp-stem {
      position: absolute;
      left: 2.25rem;
      bottom: 0.7rem;
      width: 0.34rem;
      height: 4.4rem;
      border-radius: 999px;
      background: rgba(111, 139, 165, 0.64);
    }

    .lamp-stem::after {
      position: absolute;
      right: -1.45rem;
      bottom: -0.3rem;
      width: 3.2rem;
      height: 0.5rem;
      content: "";
      border-radius: 999px;
      background: rgba(121, 99, 84, 0.7);
    }

    .mug {
      position: absolute;
      right: clamp(10rem, 24vw, 22rem);
      bottom: 2.2rem;
      width: 2.2rem;
      height: 2.1rem;
      border-radius: 0.35rem 0.35rem 0.7rem 0.7rem;
      background: linear-gradient(180deg, rgba(176, 220, 255, 0.42), rgba(34, 70, 100, 0.72));
      box-shadow: inset 0 0.16rem 0 rgba(230, 249, 255, 0.24);
    }

    .mug::after {
      position: absolute;
      top: 0.42rem;
      right: -0.7rem;
      width: 0.95rem;
      height: 1.1rem;
      content: "";
      border: 0.22rem solid rgba(105, 163, 207, 0.58);
      border-left: 0;
      border-radius: 0 999px 999px 0;
    }

    .plant {
      position: absolute;
      left: clamp(3rem, 13vw, 12rem);
      bottom: 2rem;
      width: 4rem;
      height: 4.8rem;
    }

    .plant::after {
      position: absolute;
      bottom: 0;
      left: 1rem;
      width: 2rem;
      height: 1.5rem;
      content: "";
      border-radius: 0.25rem 0.25rem 0.7rem 0.7rem;
      background: linear-gradient(180deg, rgba(63, 103, 134, 0.85), rgba(18, 36, 61, 0.95));
    }

    .plant span {
      position: absolute;
      bottom: 1.3rem;
      left: 1.85rem;
      width: 0.8rem;
      height: 2.5rem;
      border-radius: 999px 999px 0 999px;
      background: rgba(73, 184, 164, 0.5);
      transform-origin: bottom center;
    }

    .plant span:nth-child(1) {
      transform: rotate(-38deg);
    }

    .plant span:nth-child(2) {
      height: 3rem;
      transform: rotate(4deg);
    }

    .plant span:nth-child(3) {
      transform: rotate(39deg);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 28%, rgba(0, 3, 12, 0.22) 68%, rgba(0, 0, 0, 0.66) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.34));
    }

    .clock-stage {
      position: relative;
      z-index: 1;
      width: min(94vw, 1160px);
      padding: clamp(1.5rem, 4vw, 4.5rem);
      text-align: center;
      transform: translate3d(var(--drift-x, 0), var(--drift-y, 0), 0);
      transition: transform 9s ease-in-out;
    }

    .time {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: clamp(0.05em, 0.8vw, 0.16em);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4.7rem, 15vw, 13.5rem);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-weight: 500;
      letter-spacing: 0;
      line-height: 0.88;
      text-shadow:
        0 0 0.1em rgba(222, 248, 255, 0.36),
        0 0 0.38em rgba(var(--glow-a), 0.32),
        0 0 0.9em rgba(var(--glow-b), 0.16);
      animation: breathe 8s ease-in-out infinite;
    }

    .time .digit {
      display: inline-block;
      width: 0.62em;
      text-align: center;
    }

    .time .mark {
      display: inline-block;
      min-width: 0.18em;
      color: rgba(219, 246, 255, 0.82);
      transform: translateY(-0.04em);
    }

    .time .period {
      margin-left: 0.28em;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2.4rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      vertical-align: 0.48em;
    }

    .date {
      min-height: 1.65rem;
      margin-top: clamp(1rem, 2vw, 1.65rem);
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .away {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2rem;
      margin-top: 0.8rem;
      color: rgba(220, 244, 255, 0.86);
      font-size: clamp(1.05rem, 2.5vw, 1.55rem);
      letter-spacing: 0.08em;
      text-shadow: 0 0 1rem rgba(var(--glow-b), 0.28);
    }

    .away[hidden],
    .date[hidden],
    .world-clocks[hidden] {
      display: none;
    }

    .sleep-dot {
      width: 0.52em;
      height: 0.52em;
      margin-right: 0.62em;
      border-radius: 999px;
      background: rgb(var(--glow-b));
      box-shadow: 0 0 1rem rgba(var(--glow-b), 0.8);
      animation: pulse 2.8s ease-in-out infinite;
    }

    .world-clocks {
      display: grid;
      grid-template-columns: repeat(3, minmax(8.6rem, 1fr));
      gap: clamp(0.6rem, 1.2vw, 0.9rem);
      width: min(72vw, 46rem);
      margin: clamp(1rem, 2.5vw, 1.8rem) auto 0;
    }

    .zone-clock {
      min-width: 0;
      padding: 0.74rem 0.82rem;
      border: 1px solid rgba(191, 230, 255, 0.13);
      border-radius: 8px;
      background: rgba(2, 10, 25, 0.36);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 1rem 3rem rgba(0, 0, 0, 0.14);
      backdrop-filter: blur(12px);
    }

    .zone-label {
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(0.66rem, 1.15vw, 0.76rem);
      font-weight: 700;
      letter-spacing: 0.13em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .zone-time {
      margin-top: 0.18rem;
      color: rgba(235, 249, 255, 0.92);
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: clamp(1.22rem, 2.6vw, 1.72rem);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      line-height: 1.05;
      text-shadow: 0 0 0.9rem rgba(var(--glow-b), 0.14);
    }

    .zone-date {
      margin-top: 0.16rem;
      overflow: hidden;
      color: var(--quiet);
      font-size: clamp(0.66rem, 1.1vw, 0.74rem);
      letter-spacing: 0.08em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .controls {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      left: 1rem;
      display: grid;
      gap: 0.65rem;
      z-index: 5;
      max-width: 1180px;
      margin: 0 auto;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 420ms ease, transform 420ms ease;
    }

    .is-idle .controls {
      opacity: 0;
      transform: translateY(0.9rem);
      pointer-events: none;
    }

    .is-idle {
      cursor: none;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      min-height: 3.25rem;
      padding: 0.58rem;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 1.4rem 4rem rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
    }

    .control-row:first-child {
      flex-wrap: wrap;
    }

    .control-row.audio {
      display: grid;
      grid-template-columns: auto minmax(8rem, 1.1fr) minmax(9rem, 12rem) minmax(16rem, 1fr);
    }

    .icon-button,
    .theme-button {
      display: inline-grid;
      flex: 0 0 auto;
      place-items: center;
      min-width: 2.28rem;
      height: 2.28rem;
      padding: 0 0.65rem;
      border: 1px solid rgba(210, 238, 255, 0.18);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .icon-button:hover,
    .theme-button:hover {
      border-color: rgba(210, 238, 255, 0.36);
      background: rgba(255, 255, 255, 0.11);
    }

    .icon-button:active,
    .theme-button:active {
      transform: translateY(1px);
    }

    .icon-button[aria-pressed="true"],
    .theme-button[aria-pressed="true"] {
      border-color: rgba(var(--glow-b), 0.72);
      background: rgba(var(--glow-a), 0.2);
      box-shadow: 0 0 1.2rem rgba(var(--glow-b), 0.14);
    }

    .theme-button {
      width: 2.28rem;
      min-width: 2.28rem;
      padding: 0;
      border-radius: 999px;
    }

    .theme-button::before {
      width: 1.35rem;
      height: 1.35rem;
      border-radius: inherit;
      content: "";
      background: var(--swatch);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24);
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-width: 8rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      min-width: 6rem;
      accent-color: rgb(var(--glow-b));
    }

    select,
    .message-input {
      width: 100%;
      min-width: 0;
      height: 2.28rem;
      border: 1px solid rgba(210, 238, 255, 0.18);
      border-radius: 7px;
      background: rgba(1, 8, 22, 0.55);
      color: var(--text);
      outline: none;
    }

    select {
      padding: 0 0.7rem;
      cursor: pointer;
    }

    .message-input {
      padding: 0 0.8rem;
    }

    .message-input::placeholder {
      color: var(--quiet);
    }

    .theme-midnight {
      --bg-0: #020717;
      --bg-1: #061533;
      --bg-2: #0a3162;
      --glow-a: 54, 153, 255;
      --glow-b: 99, 226, 255;
      --text: #e6f5ff;
      --muted: #9fbdd5;
      --quiet: #5d7f9c;
    }

    .theme-aurora {
      --bg-0: #011017;
      --bg-1: #062743;
      --bg-2: #0d5970;
      --glow-a: 34, 190, 255;
      --glow-b: 112, 255, 221;
      --text: #e4ffff;
      --muted: #a2d5dc;
      --quiet: #5b8f9a;
    }

    .theme-abyss {
      --bg-0: #00030b;
      --bg-1: #03091a;
      --bg-2: #071e3d;
      --glow-a: 46, 104, 214;
      --glow-b: 72, 181, 255;
      --text: #dcecff;
      --muted: #879ab9;
      --quiet: #53647e;
    }

    .theme-moonlit {
      --bg-0: #030816;
      --bg-1: #101b3f;
      --bg-2: #243d75;
      --glow-a: 126, 164, 255;
      --glow-b: 173, 218, 255;
      --text: #edf4ff;
      --muted: #b7c7e4;
      --quiet: #737f9c;
    }

    @keyframes slow-turn {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(-3vw, -1vh, 0) rotate(-8deg);
      }

      to {
        transform: translate3d(3vw, 2vh, 0) rotate(8deg);
      }
    }

    @keyframes breathe {
      0%,
      100% {
        filter: drop-shadow(0 0 0.3rem rgba(var(--glow-b), 0.16));
      }

      50% {
        filter: drop-shadow(0 0 1.25rem rgba(var(--glow-b), 0.28));
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.45;
        transform: scale(0.78);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rain-slide {
      from {
        background-position: 0 0, 0 0;
      }

      to {
        background-position: 0 0, -6rem 16rem;
      }
    }

    @keyframes lamp-breathe {
      0%,
      100% {
        opacity: 0.58;
        transform: translateX(-50%) scale(0.95);
      }

      50% {
        opacity: 0.86;
        transform: translateX(-50%) scale(1.04);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 760px) {
      .clock-stage {
        padding-bottom: 10rem;
      }

      .control-row {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .control-row.audio {
        grid-template-columns: auto minmax(8rem, 1fr);
      }

      .world-clocks {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.42rem;
        width: min(92vw, 24rem);
      }

      .zone-clock {
        padding: 0.55rem 0.34rem;
      }

      .zone-label {
        font-size: 0.58rem;
        letter-spacing: 0.08em;
      }

      .zone-time {
        font-size: clamp(0.95rem, 5.2vw, 1.16rem);
      }

      .zone-date {
        font-size: 0.56rem;
        letter-spacing: 0.04em;
      }

      .message-input,
      .volume-label {
        grid-column: 1 / -1;
      }

      label {
        min-width: 7rem;
      }
    }
  </style>
</head>
<body class="theme-midnight">
  <main class="app" id="app">
    <div class="sky"></div>
    <div class="aurora"></div>
    <div class="room-scene" aria-hidden="true">
      <div class="room-window">
        <span class="moon"></span>
        <span class="building building-one"></span>
        <span class="building building-two"></span>
        <span class="building building-three"></span>
        <span class="building building-four"></span>
      </div>
      <div class="shelf">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="desk">
        <div class="lamp">
          <span class="lamp-shade"></span>
          <span class="lamp-stem"></span>
        </div>
        <div class="mug"></div>
        <div class="plant">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <canvas id="nightCanvas" aria-hidden="true"></canvas>
    <div class="vignette"></div>

    <section class="clock-stage" id="clockStage" aria-label="Night clock">
      <div class="time" id="time" aria-live="polite"></div>
      <div class="date" id="date"></div>
      <div class="away" id="away">
        <span class="sleep-dot" aria-hidden="true"></span>
        <span id="awayText">away · asleep probably</span>
      </div>
      <div class="world-clocks" id="worldClocks" aria-label="Friend time zones"></div>
    </section>

    <section class="controls" id="controls" aria-label="Night display controls">
      <div class="control-row">
        <button class="icon-button" id="fullscreenButton" title="Fullscreen" aria-label="Fullscreen">⛶</button>
        <button class="theme-button" data-theme="midnight" style="--swatch: linear-gradient(135deg, #061533, #3999ff)" title="Midnight theme" aria-label="Midnight theme"></button>
        <button class="theme-button" data-theme="aurora" style="--swatch: linear-gradient(135deg, #062743, #70ffdd)" title="Aurora theme" aria-label="Aurora theme"></button>
        <button class="theme-button" data-theme="abyss" style="--swatch: linear-gradient(135deg, #00030b, #2e68d6)" title="Abyss theme" aria-label="Abyss theme"></button>
        <button class="theme-button" data-theme="moonlit" style="--swatch: linear-gradient(135deg, #101b3f, #addaff)" title="Moonlit theme" aria-label="Moonlit theme"></button>
        <label title="Display brightness">☾ <input id="brightness" type="range" min="0.08" max="1" step="0.01"></label>
        <button class="icon-button" id="formatButton" title="Toggle 12 or 24 hour time" aria-label="Toggle 12 or 24 hour time">24h</button>
        <button class="icon-button" id="secondsButton" title="Toggle seconds" aria-label="Toggle seconds">sec</button>
        <button class="icon-button" id="dateButton" title="Toggle date" aria-label="Toggle date">date</button>
        <button class="icon-button" id="awayButton" title="Toggle away note" aria-label="Toggle away note">away</button>
        <button class="icon-button" id="worldButton" title="Toggle friend clocks" aria-label="Toggle friend clocks">zones</button>
      </div>

      <div class="control-row audio">
        <button class="icon-button" id="audioButton" title="Play sleep sound" aria-label="Play sleep sound">▶</button>
        <select id="soundSelect" title="Sleep sound" aria-label="Sleep sound">
          <option value="waves">Waves</option>
          <option value="rain">Rain</option>
          <option value="hush">Hush</option>
          <option value="dream">Dream pad</option>
        </select>
        <label class="volume-label" title="Sound volume">vol <input id="volume" type="range" min="0" max="1" step="0.01"></label>
        <input class="message-input" id="messageInput" type="text" maxlength="54" aria-label="Away message" placeholder="away · asleep probably">
      </div>
    </section>
  </main>

  <script>
    const storageKey = "night-display-settings";
    const defaults = {
      theme: "midnight",
      brightness: 0.72,
      use24h: false,
      showSeconds: true,
      showDate: true,
      showAway: true,
      showWorld: true,
      message: "away · asleep probably",
      sound: "waves",
      volume: 0.28
    };

    const friendClocks = [
      { label: "Sydney", zone: "Australia/Sydney" },
      { label: "Perth", zone: "Australia/Perth" },
      { label: "London", zone: "Europe/London" }
    ];

    const state = loadSettings();
    const elements = {
      app: document.getElementById("app"),
      body: document.body,
      stage: document.getElementById("clockStage"),
      time: document.getElementById("time"),
      date: document.getElementById("date"),
      away: document.getElementById("away"),
      awayText: document.getElementById("awayText"),
      worldClocks: document.getElementById("worldClocks"),
      controls: document.getElementById("controls"),
      fullscreenButton: document.getElementById("fullscreenButton"),
      brightness: document.getElementById("brightness"),
      formatButton: document.getElementById("formatButton"),
      secondsButton: document.getElementById("secondsButton"),
      dateButton: document.getElementById("dateButton"),
      awayButton: document.getElementById("awayButton"),
      worldButton: document.getElementById("worldButton"),
      audioButton: document.getElementById("audioButton"),
      soundSelect: document.getElementById("soundSelect"),
      volume: document.getElementById("volume"),
      messageInput: document.getElementById("messageInput")
    };

    const canvas = document.getElementById("nightCanvas");
    const context = canvas.getContext("2d");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const stars = [];
    let width = 0;
    let height = 0;
    let dpr = 1;
    let idleTimer = 0;
    let audio = null;

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return { ...defaults, ...saved };
      } catch {
        return { ...defaults };
      }
    }

    function saveSettings() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function applySettings() {
      document.body.className = `theme-${state.theme}`;
      document.documentElement.style.setProperty("--brightness", state.brightness);
      elements.brightness.value = state.brightness;
      elements.formatButton.textContent = state.use24h ? "12h" : "24h";
      elements.formatButton.setAttribute("aria-pressed", String(state.use24h));
      elements.secondsButton.setAttribute("aria-pressed", String(state.showSeconds));
      elements.dateButton.setAttribute("aria-pressed", String(state.showDate));
      elements.awayButton.setAttribute("aria-pressed", String(state.showAway));
      elements.worldButton.setAttribute("aria-pressed", String(state.showWorld));
      elements.date.hidden = !state.showDate;
      elements.away.hidden = !state.showAway;
      elements.worldClocks.hidden = !state.showWorld;
      elements.awayText.textContent = state.message || defaults.message;
      elements.messageInput.value = state.message;
      elements.soundSelect.value = state.sound;
      elements.volume.value = state.volume;

      document.querySelectorAll(".theme-button").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.theme === state.theme));
      });

      renderTime();
      renderWorldClocks();
    }

    function renderTime() {
      const now = new Date();
      let hours = now.getHours();
      const period = hours >= 12 ? "PM" : "AM";

      if (!state.use24h) {
        hours = hours % 12 || 12;
      }

      const pieces = [
        String(hours).padStart(state.use24h ? 2 : 1, "0"),
        String(now.getMinutes()).padStart(2, "0")
      ];

      if (state.showSeconds) {
        pieces.push(String(now.getSeconds()).padStart(2, "0"));
      }

      const timeMarkup = pieces
        .map((piece) => piece.split("").map((digit) => `<span class="digit">${digit}</span>`).join(""))
        .join('<span class="mark">:</span>');

      elements.time.innerHTML = state.use24h
        ? timeMarkup
        : `${timeMarkup}<span class="period">${period}</span>`;

      elements.date.textContent = now.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric"
      });

      renderWorldClocks(now);
    }

    function renderWorldClocks(now = new Date()) {
      elements.worldClocks.innerHTML = friendClocks.map((clock) => {
        const time = new Intl.DateTimeFormat(undefined, {
          timeZone: clock.zone,
          hour: "numeric",
          minute: "2-digit",
          hour12: !state.use24h
        }).format(now);

        const date = new Intl.DateTimeFormat(undefined, {
          timeZone: clock.zone,
          weekday: "short",
          month: "short",
          day: "numeric",
          timeZoneName: "short"
        }).format(now);

        return `
          <article class="zone-clock">
            <div class="zone-label">${clock.label}</div>
            <div class="zone-time">${time}</div>
            <div class="zone-date">${date}</div>
          </article>
        `;
      }).join("");
    }

    function resizeCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      seedStars();
    }

    function seedStars() {
      stars.length = 0;
      const count = Math.max(80, Math.round((width * height) / 10500));

      for (let index = 0; index < count; index += 1) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.35 + 0.22,
          alpha: Math.random() * 0.52 + 0.18,
          speed: Math.random() * 0.018 + 0.004,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function getGlowColor(variable) {
      return getComputedStyle(document.documentElement).getPropertyValue(variable).trim() || "99, 226, 255";
    }

    function drawNight(time = 0) {
      const seconds = time / 1000;
      const glowA = getGlowColor("--glow-a");
      const glowB = getGlowColor("--glow-b");

      context.clearRect(0, 0, width, height);

      const sweep = context.createLinearGradient(0, 0, width, height);
      sweep.addColorStop(0, `rgba(${glowA}, 0)`);
      sweep.addColorStop(0.44, `rgba(${glowB}, ${prefersReducedMotion ? 0.08 : 0.12})`);
      sweep.addColorStop(0.56, `rgba(${glowA}, ${prefersReducedMotion ? 0.06 : 0.1})`);
      sweep.addColorStop(1, `rgba(${glowB}, 0)`);

      context.save();
      context.translate(width / 2, height / 2);
      context.rotate(prefersReducedMotion ? 0.2 : seconds * 0.018);
      context.translate(-width / 2, -height / 2);
      context.fillStyle = sweep;
      context.fillRect(-width * 0.25, -height * 0.25, width * 1.5, height * 1.5);
      context.restore();

      context.save();
      context.globalCompositeOperation = "screen";
      stars.forEach((star) => {
        const twinkle = prefersReducedMotion ? 0.72 : 0.5 + Math.sin(seconds * star.speed * 14 + star.phase) * 0.5;
        context.beginPath();
        context.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        context.fillStyle = `rgba(230, 249, 255, ${star.alpha * (0.35 + twinkle * 0.65)})`;
        context.fill();
      });
      context.restore();

      if (!prefersReducedMotion) {
        requestAnimationFrame(drawNight);
      }
    }

    function updateDrift() {
      if (prefersReducedMotion) {
        return;
      }

      const x = (Math.random() * 2 - 1) * 16;
      const y = (Math.random() * 2 - 1) * 12;
      elements.stage.style.setProperty("--drift-x", `${x}px`);
      elements.stage.style.setProperty("--drift-y", `${y}px`);
    }

    function showControls() {
      elements.app.classList.remove("is-idle");
      clearTimeout(idleTimer);
      idleTimer = window.setTimeout(() => {
        if (document.activeElement && elements.controls.contains(document.activeElement)) {
          showControls();
          return;
        }

        elements.app.classList.add("is-idle");
      }, 3400);
    }

    function setTheme(theme) {
      state.theme = theme;
      saveSettings();
      applySettings();
    }

    function toggleAudio() {
      if (!audio) {
        audio = createAudioEngine();
      }

      audio.toggle();
      updateAudioButton();
    }

    function updateAudioButton() {
      if (!audio || !audio.isPlaying()) {
        elements.audioButton.textContent = "▶";
        elements.audioButton.title = "Play sleep sound";
        elements.audioButton.setAttribute("aria-label", "Play sleep sound");
        elements.audioButton.setAttribute("aria-pressed", "false");
        return;
      }

      elements.audioButton.textContent = "Ⅱ";
      elements.audioButton.title = "Pause sleep sound";
      elements.audioButton.setAttribute("aria-label", "Pause sleep sound");
      elements.audioButton.setAttribute("aria-pressed", "true");
    }

    function createAudioEngine() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const master = ctx.createGain();
      const nodes = new Set();
      let playing = false;

      master.gain.value = 0;
      master.connect(ctx.destination);

      function makeNoiseBuffer() {
        const buffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0;

        for (let i = 0; i < data.length; i += 1) {
          const white = Math.random() * 2 - 1;
          lastOut = (lastOut + 0.025 * white) / 1.025;
          data[i] = lastOut * 3.5;
        }

        return buffer;
      }

      function sourceFromNoise() {
        const source = ctx.createBufferSource();
        source.buffer = makeNoiseBuffer();
        source.loop = true;
        nodes.add(source);
        return source;
      }

      function clear() {
        nodes.forEach((node) => {
          try {
            node.stop();
          } catch {
            // Node was already stopped.
          }
        });
        nodes.clear();
      }

      function connectWaves() {
        const source = sourceFromNoise();
        const lowpass = ctx.createBiquadFilter();
        const swell = ctx.createGain();
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();

        lowpass.type = "lowpass";
        lowpass.frequency.value = 620;
        lowpass.Q.value = 0.8;
        swell.gain.value = 0.42;
        lfo.frequency.value = 0.075;
        lfoGain.gain.value = 0.22;

        lfo.connect(lfoGain);
        lfoGain.connect(swell.gain);
        source.connect(lowpass);
        lowpass.connect(swell);
        swell.connect(master);

        nodes.add(lfo);
        source.start();
        lfo.start();
      }

      function connectRain() {
        const source = sourceFromNoise();
        const highpass = ctx.createBiquadFilter();
        const band = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        highpass.type = "highpass";
        highpass.frequency.value = 950;
        band.type = "bandpass";
        band.frequency.value = 3900;
        band.Q.value = 0.55;
        gain.gain.value = 0.34;

        source.connect(highpass);
        highpass.connect(band);
        band.connect(gain);
        gain.connect(master);
        source.start();
      }

      function connectHush() {
        const source = sourceFromNoise();
        const lowpass = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        lowpass.type = "lowpass";
        lowpass.frequency.value = 360;
        lowpass.Q.value = 0.6;
        gain.gain.value = 0.52;

        source.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(master);
        source.start();
      }

      function connectDream() {
        const chord = [146.83, 220, 277.18, 369.99];
        const padGain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        padGain.gain.value = 0.08;
        filter.type = "lowpass";
        filter.frequency.value = 860;
        filter.Q.value = 0.2;
        padGain.connect(filter);
        filter.connect(master);

        chord.forEach((frequency, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const pan = ctx.createStereoPanner();

          osc.type = index % 2 ? "sine" : "triangle";
          osc.frequency.value = frequency;
          gain.gain.value = 0.08;
          pan.pan.value = [-0.45, -0.12, 0.18, 0.42][index];
          osc.connect(gain);
          gain.connect(pan);
          pan.connect(padGain);
          nodes.add(osc);
          osc.start();
        });

        const source = sourceFromNoise();
        const noiseGain = ctx.createGain();
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = "lowpass";
        noiseFilter.frequency.value = 220;
        noiseGain.gain.value = 0.11;
        source.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(master);
        source.start();
      }

      function startSound() {
        clear();

        if (state.sound === "rain") {
          connectRain();
        } else if (state.sound === "hush") {
          connectHush();
        } else if (state.sound === "dream") {
          connectDream();
        } else {
          connectWaves();
        }
      }

      return {
        toggle() {
          if (playing) {
            playing = false;
            master.gain.cancelScheduledValues(ctx.currentTime);
            master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
            window.setTimeout(clear, 760);
            return;
          }

          playing = true;
          startSound();
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.setValueAtTime(0, ctx.currentTime);
          master.gain.linearRampToValueAtTime(Number(state.volume), ctx.currentTime + 1.8);

          ctx.resume().catch(() => {
            playing = false;
            clear();
            updateAudioButton();
          });
        },
        changeSound() {
          if (playing) {
            startSound();
          }
        },
        setVolume(value) {
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.linearRampToValueAtTime(value, ctx.currentTime + 0.12);
        },
        isPlaying() {
          return playing;
        }
      };
    }

    document.querySelectorAll(".theme-button").forEach((button) => {
      button.addEventListener("click", () => setTheme(button.dataset.theme));
    });

    elements.fullscreenButton.addEventListener("click", async () => {
      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        await document.documentElement.requestFullscreen();
      }
    });

    elements.brightness.addEventListener("input", (event) => {
      state.brightness = Number(event.target.value);
      saveSettings();
      applySettings();
    });

    elements.formatButton.addEventListener("click", () => {
      state.use24h = !state.use24h;
      saveSettings();
      applySettings();
    });

    elements.secondsButton.addEventListener("click", () => {
      state.showSeconds = !state.showSeconds;
      saveSettings();
      applySettings();
    });

    elements.dateButton.addEventListener("click", () => {
      state.showDate = !state.showDate;
      saveSettings();
      applySettings();
    });

    elements.awayButton.addEventListener("click", () => {
      state.showAway = !state.showAway;
      saveSettings();
      applySettings();
    });

    elements.worldButton.addEventListener("click", () => {
      state.showWorld = !state.showWorld;
      saveSettings();
      applySettings();
    });

    elements.audioButton.addEventListener("click", toggleAudio);

    elements.soundSelect.addEventListener("change", (event) => {
      state.sound = event.target.value;
      saveSettings();

      if (audio) {
        audio.changeSound();
      }
    });

    elements.volume.addEventListener("input", (event) => {
      state.volume = Number(event.target.value);
      saveSettings();

      if (audio) {
        audio.setVolume(state.volume);
      }
    });

    elements.messageInput.addEventListener("input", (event) => {
      state.message = event.target.value.trim() || defaults.message;
      saveSettings();
      applySettings();
    });

    window.addEventListener("resize", resizeCanvas);
    ["mousemove", "mousedown", "keydown", "touchstart", "focusin"].forEach((eventName) => {
      window.addEventListener(eventName, showControls, { passive: true });
    });

    resizeCanvas();
    applySettings();
    drawNight();
    renderTime();
    showControls();

    setInterval(renderTime, 500);
    setInterval(updateDrift, 180000);
    window.setTimeout(updateDrift, 3000);
  </script>
</body>
</html>
