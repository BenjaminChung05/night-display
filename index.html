<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Night Display</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #020717;
      --bg-1: #061533;
      --bg-2: #0a3162;
      --glow-a: 54, 153, 255;
      --glow-b: 99, 226, 255;
      --text: #e6f5ff;
      --muted: #9fbdd5;
      --quiet: #5d7f9c;
      --panel: rgba(5, 15, 34, 0.52);
      --panel-border: rgba(174, 224, 255, 0.16);
      --brightness: 0.72;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    button,
    input,
    select {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .app {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      isolation: isolate;
      filter: brightness(var(--brightness));
      transition: filter 240ms ease;
    }

    .media-background {
      position: fixed;
      inset: 0;
      z-index: -5;
      overflow: hidden;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 360ms ease;
    }

    .app.has-custom-background .media-background {
      opacity: 1;
    }

    .media-background img,
    .media-background video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.92) contrast(0.9) brightness(0.86);
    }

    .app.has-custom-background .sky {
      opacity: 0.34;
    }

    .app.has-custom-background .aurora {
      opacity: 0.26;
    }

    .app.has-custom-background .room-scene {
      opacity: 0.18;
    }

    .app.has-custom-background canvas {
      opacity: 0.42;
    }

    .app.has-custom-background .vignette {
      background:
        radial-gradient(circle at center, transparent 22%, rgba(0, 3, 12, 0.24) 62%, rgba(0, 0, 0, 0.72) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.42));
    }

    .library-scene {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 360ms ease;
    }

    .app.background-lake .library-scene,
    .app.background-paper .library-scene,
    .app.background-aurora-live .library-scene,
    .app.background-rain-live .library-scene,
    .app.background-comets-live .library-scene {
      opacity: 0.88;
    }

    .app.background-lake .room-scene,
    .app.background-paper .room-scene,
    .app.background-aurora-live .room-scene,
    .app.background-rain-live .room-scene,
    .app.background-comets-live .room-scene {
      opacity: 0;
    }

    .app.background-lake .sky {
      background:
        radial-gradient(circle at 62% 24%, rgba(255, 241, 210, 0.16), transparent 11rem),
        linear-gradient(180deg, #08142b 0%, #163252 48%, #07131f 100%);
    }

    .app.background-paper .sky {
      background:
        radial-gradient(circle at 26% 18%, rgba(255, 216, 143, 0.12), transparent 13rem),
        linear-gradient(160deg, #130e23 0%, #1b2743 48%, #071623 100%);
    }

    .app.background-aurora-live .sky {
      background:
        radial-gradient(circle at 50% 30%, rgba(116, 255, 222, 0.16), transparent 24rem),
        linear-gradient(145deg, #021016 0%, #07324b 48%, #151747 100%);
    }

    .app.background-rain-live .sky {
      background:
        radial-gradient(circle at 74% 25%, rgba(255, 179, 111, 0.12), transparent 16rem),
        linear-gradient(160deg, #050711 0%, #13233d 48%, #081624 100%);
    }

    .app.background-comets-live .sky {
      background:
        radial-gradient(circle at 42% 42%, rgba(230, 133, 255, 0.12), transparent 20rem),
        linear-gradient(145deg, #050414 0%, #15163c 48%, #031a2c 100%);
    }

    .library-scene span {
      position: absolute;
      display: block;
    }

    .lake-moon {
      top: 12vh;
      left: 62vw;
      width: clamp(4rem, 9vw, 7.2rem);
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255, 238, 204, 0.86);
      box-shadow:
        0 0 2.2rem rgba(255, 225, 174, 0.3),
        0 0 8rem rgba(113, 192, 255, 0.2);
    }

    .lake-ridge {
      right: -4vw;
      left: -4vw;
      bottom: 35vh;
      height: 17vh;
      background: linear-gradient(135deg, rgba(13, 39, 59, 0.96), rgba(6, 16, 31, 0.98));
      clip-path: polygon(0 70%, 12% 34%, 24% 60%, 36% 22%, 49% 62%, 62% 30%, 74% 58%, 88% 24%, 100% 66%, 100% 100%, 0 100%);
    }

    .lake-ridge.back {
      bottom: 42vh;
      opacity: 0.44;
      transform: scaleY(0.72);
    }

    .lake-water {
      right: -6vw;
      bottom: 0;
      left: -6vw;
      height: 42vh;
      background:
        linear-gradient(90deg, transparent 0 14%, rgba(255, 230, 190, 0.18) 48% 54%, transparent 86%),
        repeating-linear-gradient(180deg, rgba(190, 230, 255, 0.12) 0 1px, transparent 1px 1.1rem),
        linear-gradient(180deg, rgba(18, 60, 85, 0.7), rgba(2, 9, 19, 0.96));
    }

    .lake-shore {
      right: -4vw;
      bottom: 5vh;
      left: -4vw;
      height: 12vh;
      border-radius: 50% 50% 0 0;
      background: rgba(2, 7, 16, 0.78);
    }

    .paper-star {
      width: clamp(3.4rem, 7vw, 5.8rem);
      aspect-ratio: 1;
      background:
        linear-gradient(45deg, transparent 39%, rgba(255, 224, 151, 0.82) 40% 60%, transparent 61%),
        linear-gradient(-45deg, transparent 39%, rgba(255, 224, 151, 0.82) 40% 60%, transparent 61%);
      filter: drop-shadow(0 0 1.5rem rgba(255, 204, 132, 0.28));
      opacity: 0.62;
    }

    .paper-star.one {
      top: 14vh;
      left: 13vw;
      transform: rotate(8deg);
    }

    .paper-star.two {
      top: 19vh;
      right: 17vw;
      width: clamp(2.8rem, 5vw, 4.6rem);
      opacity: 0.46;
      transform: rotate(-18deg);
    }

    .paper-star.three {
      right: 30vw;
      bottom: 27vh;
      width: clamp(2.5rem, 4vw, 3.8rem);
      opacity: 0.38;
      transform: rotate(32deg);
    }

    .paper-hills {
      right: -4vw;
      bottom: 0;
      left: -4vw;
      height: 44vh;
      background:
        radial-gradient(ellipse at 22% 84%, rgba(39, 113, 111, 0.54), transparent 31%),
        radial-gradient(ellipse at 72% 88%, rgba(93, 76, 132, 0.56), transparent 34%),
        linear-gradient(180deg, transparent 0 35%, rgba(4, 11, 22, 0.94) 92%);
    }

    .paper-horizon {
      right: -8vw;
      bottom: 22vh;
      left: -8vw;
      height: 16vh;
      background: rgba(6, 21, 34, 0.74);
      clip-path: polygon(0 72%, 15% 42%, 26% 64%, 41% 36%, 54% 70%, 70% 39%, 84% 62%, 100% 40%, 100% 100%, 0 100%);
    }

    .aurora-band {
      inset: 0;
      margin: auto;
      width: 130vw;
      height: 42vh;
      border-radius: 50%;
      filter: blur(24px);
      mix-blend-mode: screen;
      opacity: 0.5;
      transform-origin: 50% 50%;
    }

    .aurora-band.one {
      top: 2vh;
      left: -16vw;
      background: conic-gradient(from 140deg at 50% 50%, transparent, rgba(109, 255, 220, 0.54), rgba(92, 149, 255, 0.32), transparent 62%);
      animation: aurora-sway 16s ease-in-out infinite alternate;
    }

    .aurora-band.two {
      top: 14vh;
      right: -24vw;
      background: conic-gradient(from 210deg at 45% 60%, transparent, rgba(255, 157, 225, 0.32), rgba(100, 223, 255, 0.46), transparent 70%);
      animation: aurora-sway 22s ease-in-out infinite alternate-reverse;
    }

    .aurora-ground {
      right: -5vw;
      bottom: 0;
      left: -5vw;
      height: 32vh;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(77, 196, 168, 0.18), transparent 38%),
        linear-gradient(180deg, transparent, rgba(1, 7, 15, 0.92));
    }

    .rain-window {
      top: 8vh;
      right: 9vw;
      bottom: 10vh;
      left: 9vw;
      border: 1px solid rgba(188, 229, 255, 0.12);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(188, 229, 255, 0.1) 50%, transparent calc(50% + 1px)),
        linear-gradient(180deg, transparent calc(54% - 1px), rgba(188, 229, 255, 0.08) 54%, transparent calc(54% + 1px)),
        linear-gradient(180deg, rgba(16, 35, 62, 0.48), rgba(2, 7, 18, 0.42));
      box-shadow: inset 0 0 4rem rgba(97, 176, 255, 0.07);
    }

    .rain-drops {
      inset: -20vh -10vw;
      background: repeating-linear-gradient(104deg, transparent 0 1.2rem, rgba(186, 230, 255, 0.22) 1.28rem 1.36rem);
      opacity: 0.52;
      animation: rain-fall 1.9s linear infinite;
    }

    .rain-city {
      right: 0;
      bottom: 0;
      left: 0;
      height: 31vh;
      background:
        repeating-linear-gradient(90deg, rgba(255, 185, 101, 0.16) 0 0.28rem, transparent 0.28rem 2.8rem),
        linear-gradient(180deg, transparent 0 18%, rgba(3, 10, 22, 0.96) 19%);
      opacity: 0.72;
    }

    .comet {
      width: 12rem;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 236, 203, 0.9));
      box-shadow: 0 0 1.4rem rgba(139, 222, 255, 0.32);
      opacity: 0;
      transform: rotate(-26deg);
      animation: comet-pass 8.5s linear infinite;
    }

    .comet.one {
      top: 18vh;
      left: -14rem;
    }

    .comet.two {
      top: 36vh;
      left: -18rem;
      width: 9rem;
      animation-delay: 2.8s;
      animation-duration: 10s;
    }

    .comet.three {
      top: 12vh;
      left: -22rem;
      width: 15rem;
      animation-delay: 5.6s;
      animation-duration: 12s;
    }

    .comet-haze {
      right: -6vw;
      bottom: 0;
      left: -6vw;
      height: 36vh;
      background:
        radial-gradient(ellipse at 28% 100%, rgba(63, 95, 173, 0.32), transparent 32%),
        radial-gradient(ellipse at 80% 96%, rgba(46, 171, 171, 0.22), transparent 34%),
        linear-gradient(180deg, transparent, rgba(1, 5, 13, 0.94));
    }

    .sky {
      position: fixed;
      inset: 0;
      z-index: -4;
      background:
        radial-gradient(circle at 48% 45%, rgba(var(--glow-a), 0.16), transparent 34rem),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 48%, var(--bg-2));
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      position: fixed;
      inset: -24vmax;
      z-index: -3;
      content: "";
      pointer-events: none;
      filter: blur(62px);
      opacity: 0.52;
      mix-blend-mode: screen;
      transform-origin: 50% 52%;
    }

    .aurora {
      background:
        radial-gradient(ellipse at 20% 34%, rgba(var(--glow-b), 0.22), transparent 28%),
        radial-gradient(ellipse at 78% 28%, rgba(var(--glow-a), 0.2), transparent 30%),
        radial-gradient(ellipse at 54% 70%, rgba(30, 74, 170, 0.2), transparent 34%);
      animation: slow-turn 72s linear infinite;
    }

    .aurora::before {
      background:
        conic-gradient(from 80deg at 50% 52%, transparent, rgba(var(--glow-a), 0.2), transparent 34%, rgba(var(--glow-b), 0.16), transparent 70%);
      animation: slow-turn 118s linear infinite reverse;
    }

    .aurora::after {
      background:
        radial-gradient(ellipse at 45% 55%, rgba(108, 198, 255, 0.18), transparent 22%),
        radial-gradient(ellipse at 64% 40%, rgba(20, 116, 230, 0.16), transparent 26%);
      animation: drift 26s ease-in-out infinite alternate;
    }

    .room-scene {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.78;
    }

    .room-scene::before {
      position: absolute;
      inset: auto -8vw 0;
      height: 44vh;
      content: "";
      background:
        radial-gradient(ellipse at 50% 0%, rgba(67, 151, 255, 0.2), transparent 55%),
        linear-gradient(180deg, rgba(4, 13, 31, 0), rgba(1, 4, 13, 0.88) 42%, rgba(0, 0, 0, 0.96));
    }

    .room-window {
      position: absolute;
      top: clamp(1.2rem, 6vh, 4rem);
      left: clamp(1rem, 7vw, 6rem);
      width: clamp(13rem, 24vw, 23rem);
      height: clamp(15rem, 42vh, 29rem);
      border: 1px solid rgba(172, 224, 255, 0.14);
      border-radius: 16px 16px 6px 6px;
      background:
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(169, 219, 255, 0.12) 50%, transparent calc(50% + 1px)),
        linear-gradient(180deg, transparent calc(58% - 1px), rgba(169, 219, 255, 0.1) 58%, transparent calc(58% + 1px)),
        radial-gradient(circle at 70% 18%, rgba(179, 221, 255, 0.18), transparent 12%),
        linear-gradient(180deg, rgba(9, 24, 55, 0.74), rgba(3, 10, 28, 0.78));
      box-shadow:
        inset 0 0 3rem rgba(82, 179, 255, 0.08),
        0 0 4rem rgba(31, 129, 226, 0.08);
    }

    .room-window::before {
      position: absolute;
      inset: 0;
      content: "";
      border-radius: inherit;
      background-image:
        linear-gradient(112deg, transparent 0 38%, rgba(161, 221, 255, 0.16) 39%, transparent 42%),
        repeating-linear-gradient(104deg, rgba(181, 232, 255, 0) 0 1.1rem, rgba(181, 232, 255, 0.13) 1.2rem 1.28rem);
      background-size: 100% 100%, 12rem 16rem;
      animation: rain-slide 11s linear infinite;
      opacity: 0.58;
    }

    .room-window::after {
      position: absolute;
      right: -1rem;
      bottom: -0.8rem;
      left: -1rem;
      height: 2.1rem;
      content: "";
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(25, 51, 82, 0.78), rgba(4, 10, 25, 0.88));
      box-shadow: 0 0.8rem 1.8rem rgba(0, 0, 0, 0.34);
    }

    .moon {
      position: absolute;
      top: 12%;
      right: 16%;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: 50%;
      background: rgba(220, 246, 255, 0.72);
      box-shadow:
        0 0 1.2rem rgba(190, 232, 255, 0.42),
        0 0 4rem rgba(111, 186, 255, 0.26);
    }

    .building {
      position: absolute;
      bottom: 1.6rem;
      display: block;
      border-radius: 4px 4px 0 0;
      background:
        repeating-linear-gradient(180deg, rgba(158, 222, 255, 0.18) 0 0.16rem, transparent 0.18rem 0.72rem),
        linear-gradient(180deg, rgba(13, 38, 80, 0.85), rgba(2, 8, 24, 0.96));
      opacity: 0.8;
    }

    .building-one {
      left: 8%;
      width: 14%;
      height: 32%;
    }

    .building-two {
      left: 26%;
      width: 18%;
      height: 45%;
    }

    .building-three {
      right: 28%;
      width: 15%;
      height: 28%;
    }

    .building-four {
      right: 8%;
      width: 18%;
      height: 38%;
    }

    .shelf {
      position: absolute;
      top: clamp(5rem, 12vh, 9rem);
      right: clamp(1rem, 7vw, 5rem);
      display: flex;
      align-items: flex-end;
      gap: 0.55rem;
      width: clamp(10rem, 18vw, 17rem);
      height: 3.6rem;
      padding: 0 1rem 0.5rem;
      border-bottom: 0.35rem solid rgba(38, 72, 111, 0.62);
      opacity: 0.72;
    }

    .shelf span {
      display: block;
      width: 1.05rem;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, rgba(130, 199, 255, 0.34), rgba(12, 32, 67, 0.84));
    }

    .shelf span:nth-child(1) {
      height: 2.7rem;
    }

    .shelf span:nth-child(2) {
      height: 2rem;
      background: linear-gradient(180deg, rgba(255, 203, 122, 0.3), rgba(61, 43, 24, 0.75));
    }

    .shelf span:nth-child(3) {
      width: 3rem;
      height: 1.35rem;
    }

    .desk {
      position: absolute;
      right: clamp(1rem, 6vw, 5rem);
      bottom: 0;
      left: clamp(1rem, 6vw, 5rem);
      height: clamp(7rem, 18vh, 11rem);
      border-radius: 18px 18px 0 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent 18% 78%, rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, rgba(26, 51, 79, 0.74), rgba(4, 10, 24, 0.96));
      box-shadow:
        inset 0 1px 0 rgba(197, 230, 255, 0.08),
        0 -1.8rem 5rem rgba(0, 0, 0, 0.22);
    }

    .lamp {
      position: absolute;
      right: clamp(4rem, 13vw, 12rem);
      bottom: 2rem;
      width: 4.8rem;
      height: 6.8rem;
    }

    .lamp::before {
      position: absolute;
      top: -3.8rem;
      left: 50%;
      width: 14rem;
      height: 14rem;
      content: "";
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 192, 101, 0.22), rgba(255, 192, 101, 0.06) 45%, transparent 70%);
      transform: translateX(-50%);
      animation: lamp-breathe 5.8s ease-in-out infinite;
    }

    .lamp-shade {
      position: absolute;
      top: 0.45rem;
      left: 0.7rem;
      width: 3.5rem;
      height: 1.8rem;
      border-radius: 1rem 1rem 0.3rem 0.3rem;
      background: linear-gradient(180deg, rgba(255, 209, 122, 0.92), rgba(119, 72, 42, 0.76));
      box-shadow: 0 0 1.6rem rgba(255, 186, 93, 0.3);
    }

    .lamp-stem {
      position: absolute;
      left: 2.25rem;
      bottom: 0.7rem;
      width: 0.34rem;
      height: 4.4rem;
      border-radius: 999px;
      background: rgba(111, 139, 165, 0.64);
    }

    .lamp-stem::after {
      position: absolute;
      right: -1.45rem;
      bottom: -0.3rem;
      width: 3.2rem;
      height: 0.5rem;
      content: "";
      border-radius: 999px;
      background: rgba(121, 99, 84, 0.7);
    }

    .mug {
      position: absolute;
      right: clamp(10rem, 24vw, 22rem);
      bottom: 2.2rem;
      width: 2.2rem;
      height: 2.1rem;
      border-radius: 0.35rem 0.35rem 0.7rem 0.7rem;
      background: linear-gradient(180deg, rgba(176, 220, 255, 0.42), rgba(34, 70, 100, 0.72));
      box-shadow: inset 0 0.16rem 0 rgba(230, 249, 255, 0.24);
    }

    .mug::after {
      position: absolute;
      top: 0.42rem;
      right: -0.7rem;
      width: 0.95rem;
      height: 1.1rem;
      content: "";
      border: 0.22rem solid rgba(105, 163, 207, 0.58);
      border-left: 0;
      border-radius: 0 999px 999px 0;
    }

    .plant {
      position: absolute;
      left: clamp(3rem, 13vw, 12rem);
      bottom: 2rem;
      width: 4rem;
      height: 4.8rem;
    }

    .plant::after {
      position: absolute;
      bottom: 0;
      left: 1rem;
      width: 2rem;
      height: 1.5rem;
      content: "";
      border-radius: 0.25rem 0.25rem 0.7rem 0.7rem;
      background: linear-gradient(180deg, rgba(63, 103, 134, 0.85), rgba(18, 36, 61, 0.95));
    }

    .plant span {
      position: absolute;
      bottom: 1.3rem;
      left: 1.85rem;
      width: 0.8rem;
      height: 2.5rem;
      border-radius: 999px 999px 0 999px;
      background: rgba(73, 184, 164, 0.5);
      transform-origin: bottom center;
    }

    .plant span:nth-child(1) {
      transform: rotate(-38deg);
    }

    .plant span:nth-child(2) {
      height: 3rem;
      transform: rotate(4deg);
    }

    .plant span:nth-child(3) {
      transform: rotate(39deg);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 28%, rgba(0, 3, 12, 0.22) 68%, rgba(0, 0, 0, 0.66) 100%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.34));
    }

    .clock-stage {
      position: relative;
      z-index: 1;
      width: min(94vw, 1160px);
      padding: clamp(1.5rem, 4vw, 4.5rem);
      text-align: center;
      transform: translate3d(var(--drift-x, 0), var(--drift-y, 0), 0);
      transition: transform 9s ease-in-out;
    }

    .time {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: clamp(0.05em, 0.8vw, 0.16em);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4.7rem, 15vw, 13.5rem);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-weight: 500;
      letter-spacing: 0;
      line-height: 0.88;
      text-shadow:
        0 0 0.1em rgba(222, 248, 255, 0.36),
        0 0 0.38em rgba(var(--glow-a), 0.32),
        0 0 0.9em rgba(var(--glow-b), 0.16);
      animation: breathe 8s ease-in-out infinite;
    }

    .time .digit {
      display: inline-block;
      width: 0.62em;
      text-align: center;
    }

    .time .mark {
      display: inline-block;
      min-width: 0.18em;
      color: rgba(219, 246, 255, 0.82);
      transform: translateY(-0.04em);
    }

    .time .period {

      white-space: nowrap;

      transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;

    .icon-button:active,

    .icon-button:disabled {

      opacity: 0.44;
    }

    .theme-button {
      width: 2.28rem;
      min-width: 2.28rem;
      padding: 0;
      border-radius: 999px;
    }

    .theme-button::before {
      width: 1.35rem;
      height: 1.35rem;

      text-transform: uppercase;
      white-space: nowrap;

    input[type="range"] {

      min-width: 6rem;
      accent-color: rgb(var(--glow-b));
    }

    select,
    .message-input {
      width: 100%;
      min-width: 0;
      height: 2.28rem;
      border: 1px solid rgba(210, 238, 255, 0.18);
      border-radius: 7px;
      background: rgba(1, 8, 22, 0.55);
      color: var(--text);
      outline: none;
    }

    select {
      padding: 0 0.7rem;
      cursor: pointer;
    }

    .scene-select {
      flex: 0 1 13.6rem;
      width: auto;
      min-width: 11.4rem;
    }

    .message-input {
      padding: 0 0.8rem;
    }

    .message-input::placeholder {
      color: var(--quiet);
    }

    .theme-midnight {
      --bg-0: #020717;
      --bg-1: #061533;
      --bg-2: #0a3162;
      --glow-a: 54, 153, 255;
      --glow-b: 99, 226, 255;
      --text: #e6f5ff;
      --muted: #9fbdd5;
      --quiet: #5d7f9c;
    }

    .theme-aurora {
      --bg-0: #011017;
      --bg-1: #062743;
      --bg-2: #0d5970;
      --glow-a: 34, 190, 255;
      --glow-b: 112, 255, 221;
      --text: #e4ffff;
      --muted: #a2d5dc;
      --quiet: #5b8f9a;
    }

    .theme-abyss {
      --bg-0: #00030b;
      --bg-1: #03091a;
      --bg-2: #071e3d;
      --glow-a: 46, 104, 214;
      --glow-b: 72, 181, 255;
      --text: #dcecff;
      --muted: #879ab9;
      --quiet: #53647e;
    }

    .theme-moonlit {
      --bg-0: #030816;
      --bg-1: #101b3f;
      --bg-2: #243d75;
      --glow-a: 126, 164, 255;
      --glow-b: 173, 218, 255;
      --text: #edf4ff;
      --muted: #b7c7e4;
      --quiet: #737f9c;
    }

    @keyframes slow-turn {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(-3vw, -1vh, 0) rotate(-8deg);
      }

      to {
        transform: translate3d(3vw, 2vh, 0) rotate(8deg);
      }
    }

    @keyframes breathe {
      0%,
      100% {
        filter: drop-shadow(0 0 0.3rem rgba(var(--glow-b), 0.16));
      }

      50% {
        filter: drop-shadow(0 0 1.25rem rgba(var(--glow-b), 0.28));
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.45;
        transform: scale(0.78);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes rain-slide {
      from {
        background-position: 0 0, 0 0;
      }

      to {
        background-position: 0 0, -6rem 16rem;
      }
    }

    @keyframes lamp-breathe {
      0%,
      100% {
        opacity: 0.58;
        transform: translateX(-50%) scale(0.95);
      }

      50% {
        opacity: 0.86;
        transform: translateX(-50%) scale(1.04);
      }
    }

    @keyframes aurora-sway {
      from {
        transform: translate3d(-3vw, -1vh, 0) rotate(-5deg) scaleX(1);
      }

      to {
        transform: translate3d(3vw, 2vh, 0) rotate(7deg) scaleX(1.08);
      }
    }

    @keyframes rain-fall {
      from {
        transform: translate3d(-1rem, -7rem, 0);
      }

      to {
        transform: translate3d(1rem, 7rem, 0);
      }
    }

    @keyframes comet-pass {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(-26deg);
      }

      10%,
      24% {
        opacity: 0.86;
      }

      36%,
      100% {
        opacity: 0;
        transform: translate3d(125vw, 46vh, 0) rotate(-26deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 760px) {
      .clock-stage {
        padding-bottom: 10rem;
      }

      .control-row {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .control-row.audio {
        grid-template-columns: auto minmax(8rem, 1fr);
      }

      .control-row.zones {
        grid-template-columns: 1fr auto;
      }

      .zone-control-label {
        display: none;
      }

      .zone-picker-list {
        grid-template-columns: 1fr;
      }

      .world-clocks {
        grid-template-columns: repeat(auto-fit, minmax(6.2rem, 1fr));
        gap: 0.42rem;
        width: min(92vw, 24rem);
      }

      .weather-rotator {
        grid-template-columns: auto minmax(0, 1fr);
        width: min(92vw, 24rem);
      }

      .weather-index {
        display: none;
      }

      .zone-clock {
        padding: 0.55rem 0.34rem;
      }

      .zone-label {
        font-size: 0.58rem;
        letter-spacing: 0.08em;
      }

      .zone-time {
        font-size: clamp(0.95rem, 5.2vw, 1.16rem);
      }

      .zone-date {
        font-size: 0.56rem;
        letter-spacing: 0.04em;
      }

      .message-input,
      .volume-label {
        grid-column: 1 / -1;
      }

      label {
        min-width: 7rem;
      }
    }
  </style>
</head>

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return normalizeSettings({ ...defaults, ...saved });
      } catch {
        return normalizeSettings({ ...defaults });
      }

    function saveSettings() {
      localStorage.setItem(storageKey, JSON.stringify(state));

    function getDefaultWorldClocks() {
      return defaultWorldClocks.map((clock) => ({ ...clock }));
    }

    function isValidTimeZone(zone) {
      try {
        new Intl.DateTimeFormat(undefined, { timeZone: zone }).format();
        return true;
      } catch {
        return false;
      }
    }

    function getTimezoneOption(zone) {
      return timezoneLibrary.find((option) => option.zone === zone);
    }

    function normalizeWorldClocks(clocks) {
      const source = Array.isArray(clocks) ? clocks : getDefaultWorldClocks();
      const normalized = source
        .map((clock) => {
          const option = getTimezoneOption(clock.zone);

          if (option) {
            return {
              label: option.clockLabel,
              zone: option.zone
            };
          }

          if (clock.label && clock.zone && isValidTimeZone(clock.zone)) {
            return {
              label: String(clock.label).slice(0, 24),
              zone: clock.zone
            };
          }

          return null;
        })
        .filter(Boolean)
        .slice(0, maxWorldClocks);

      return normalized.length ? normalized : getDefaultWorldClocks();
    }

    function normalizeSettings(settings) {
      return {
        ...settings,
        worldClocks: normalizeWorldClocks(settings.worldClocks)
      };
    }

    function normalizeBackgroundChoice() {
      if (state.backgroundChoice === "custom" && !state.backgroundName) {
        state.backgroundChoice = "lofi";
      }

      if (state.backgroundChoice !== "custom" && !Object.prototype.hasOwnProperty.call(librarySceneMarkup, state.backgroundChoice)) {
        state.backgroundChoice = "lofi";
      }

      return state.backgroundChoice;

    function populateBackgroundSelect() {

      elements.backgroundSelect.value = options.some((background) => background.id === state.backgroundChoice)

      elements.clearBackgroundButton.hidden = !hasUpload;

        ? `Remove uploaded background: ${state.backgroundName}`
        : "Clear custom background";

    function applyBackgroundChoice() {
      const choice = normalizeBackgroundChoice();

      elements.app.classList.remove(...backgroundClasses);
      elements.libraryScene.replaceChildren();

      if (choice === "custom") {
        elements.app.classList.add("background-custom");
        populateBackgroundSelect();
        updateBackgroundControls();
        return;
      }

      renderCustomBackground(null);
      elements.app.classList.add(`background-${choice}`);
      elements.libraryScene.innerHTML = librarySceneMarkup[choice] || "";
      populateBackgroundSelect();
      updateBackgroundControls();
    }

    function applySettings() {
      document.body.className = `theme-${state.theme}`;
      document.documentElement.style.setProperty("--brightness", state.brightness);
      elements.brightness.value = state.brightness;
      elements.formatButton.textContent = state.use24h ? "12h" : "24h";
      elements.formatButton.setAttribute("aria-pressed", String(state.use24h));
      elements.secondsButton.setAttribute("aria-pressed", String(state.showSeconds));
      elements.dateButton.setAttribute("aria-pressed", String(state.showDate));
      elements.awayButton.setAttribute("aria-pressed", String(state.showAway));
      elements.worldButton.setAttribute("aria-pressed", String(state.showWorld));
      elements.date.hidden = !state.showDate;
      elements.away.hidden = !state.showAway;
      elements.worldClocks.hidden = !state.showWorld;
      elements.weatherRotator.hidden = !state.showWorld;
      elements.zoneControls.hidden = !state.showWorld;
      elements.awayText.textContent = state.message || defaults.message;
      elements.messageInput.value = state.message;
      elements.soundSelect.value = state.sound;
      elements.volume.value = state.volume;
      applyBackgroundChoice();

      document.querySelectorAll(".theme-button").forEach((button) => {

    function makeTimezoneOption(option, selectedZone) {
      const element = new Option(option.label, option.zone);
      element.selected = option.zone === selectedZone;
      return element;
    }

    function renderZoneControls() {
      state.worldClocks = normalizeWorldClocks(state.worldClocks);
      elements.zonePickerList.replaceChildren(...state.worldClocks.map((clock, index) => {
        const picker = document.createElement("div");
        const select = document.createElement("select");
        const removeButton = document.createElement("button");
        const knownOption = getTimezoneOption(clock.zone);

        picker.className = "zone-picker";
        select.className = "zone-select";
        select.dataset.zoneIndex = String(index);
        select.title = `Timezone clock ${index + 1}`;
        select.setAttribute("aria-label", `Timezone clock ${index + 1}`);
        select.replaceChildren(...timezoneLibrary.map((option) => makeTimezoneOption(option, clock.zone)));

        if (!knownOption) {
          select.append(makeTimezoneOption({
            label: `${clock.label} · saved`,
            zone: clock.zone
          }, clock.zone));
        }

        removeButton.className = "icon-button zone-remove";
        removeButton.type = "button";
        removeButton.textContent = "-";
        removeButton.dataset.zoneIndex = String(index);
        removeButton.title = `Remove ${clock.label}`;
        removeButton.setAttribute("aria-label", `Remove ${clock.label}`);
        removeButton.disabled = state.worldClocks.length <= 1;

        picker.append(select, removeButton);
        return picker;
      }));

      elements.addZoneButton.disabled = state.worldClocks.length >= maxWorldClocks;
      elements.addZoneButton.title = elements.addZoneButton.disabled
        ? `Maximum ${maxWorldClocks} timezone clocks`
        : "Add timezone clock";
    }

    function setWorldClock(index, zone) {
      const option = getTimezoneOption(zone);

      if (!option || !state.worldClocks[index]) {
        return;
      }

      state.worldClocks[index] = {
        label: option.clockLabel,
        zone: option.zone
      };
      saveSettings();
      renderZoneControls();
      renderWorldClocks();
      refreshWeather({ force: true });
    }

    function addWorldClock() {
      if (state.worldClocks.length >= maxWorldClocks) {
        return;
      }

      const usedZones = new Set(state.worldClocks.map((clock) => clock.zone));
      const nextOption = timezoneLibrary.find((option) => !usedZones.has(option.zone)) || timezoneLibrary[0];

      state.worldClocks.push({
        label: nextOption.clockLabel,
        zone: nextOption.zone
      });
      saveSettings();
      applySettings();
      refreshWeather({ force: true });
    }

    function removeWorldClock(index) {
      if (state.worldClocks.length <= 1 || !state.worldClocks[index]) {
        return;
      }

      state.worldClocks.splice(index, 1);
      weatherRotationIndex = Math.min(weatherRotationIndex, state.worldClocks.length - 1);
      saveSettings();
      applySettings();
      refreshWeather({ force: true });
    }

    function getWeatherMeta(code) {
      const weatherCodes = {
        0: { icon: "Clear", label: "Clear sky" },
        1: { icon: "Fair", label: "Mainly clear" },
        2: { icon: "Partly", label: "Partly cloudy" },
        3: { icon: "Cloudy", label: "Overcast" },
        45: { icon: "Fog", label: "Fog" },
        48: { icon: "Fog", label: "Rime fog" },
        51: { icon: "Drizzle", label: "Light drizzle" },
        53: { icon: "Drizzle", label: "Drizzle" },
        55: { icon: "Drizzle", label: "Dense drizzle" },
        61: { icon: "Rain", label: "Light rain" },
        63: { icon: "Rain", label: "Rain" },
        65: { icon: "Rain", label: "Heavy rain" },
        71: { icon: "Snow", label: "Light snow" },
        73: { icon: "Snow", label: "Snow" },
        75: { icon: "Snow", label: "Heavy snow" },
        80: { icon: "Showers", label: "Light showers" },
        81: { icon: "Showers", label: "Showers" },
        82: { icon: "Showers", label: "Heavy showers" },
        95: { icon: "Storm", label: "Thunderstorm" },
        96: { icon: "Storm", label: "Storm with hail" },
        99: { icon: "Storm", label: "Heavy storm with hail" }
      };

      return weatherCodes[code] || { icon: "Weather", label: "Forecast" };
    }

    function formatTemperature(value) {
      return Number.isFinite(value) ? `${Math.round(value)}°C` : "--";
    }

    function getWeatherOption(clock) {
      return getTimezoneOption(clock.zone);
    }

    function getWeatherUrl(option) {
      const params = new URLSearchParams({
        latitude: String(option.latitude),
        longitude: String(option.longitude),
        current: "temperature_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation",
        daily: "temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code",
        forecast_days: "3",
        timezone: option.zone
      });

      return `https://api.open-meteo.com/v1/forecast?${params.toString()}`;
    }

    function parseWeather(option, payload) {
      const current = payload.current || {};
      const daily = payload.daily || {};
      const code = Number(current.weather_code ?? daily.weather_code?.[0] ?? 0);
      const meta = getWeatherMeta(code);

      return {
        label: option.clockLabel,
        zone: option.zone,
        icon: meta.icon,
        condition: meta.label,
        temperature: current.temperature_2m,
        apparent: current.apparent_temperature,
        high: daily.temperature_2m_max?.[0],
        low: daily.temperature_2m_min?.[0],
        precipitationChance: daily.precipitation_probability_max?.[0],
        wind: current.wind_speed_10m,
        precipitation: current.precipitation,
        fetchedAt: Date.now()
      };
    }

    async function fetchWeather(option, { force = false } = {}) {
      const cached = weatherCache.get(option.zone);
      const isFresh = cached && cached.status === "ready" && Date.now() - cached.data.fetchedAt < 30 * 60 * 1000;

      if (!force && isFresh) {
        return cached.data;
      }

      weatherCache.set(option.zone, {
        status: "loading",
        data: cached?.data || null
      });
      renderWeatherCard();

      try {
        const response = await fetch(getWeatherUrl(option));

        if (!response.ok) {
          throw new Error(`Weather request failed: ${response.status}`);
        }

        const data = parseWeather(option, await response.json());
        weatherCache.set(option.zone, {
          status: "ready",
          data
        });
        return data;
      } catch (error) {
        weatherCache.set(option.zone, {
          status: "error",
          data: cached?.data || null
        });
        console.warn("Could not load weather forecast.", error);
        return null;
      } finally {
        renderWeatherCard();
      }
    }

    function getActiveWeatherClock() {
      state.worldClocks = normalizeWorldClocks(state.worldClocks);
      weatherRotationIndex %= state.worldClocks.length;
      return state.worldClocks[weatherRotationIndex];
    }

    function renderWeatherCard() {
      if (!state.showWorld) {
        elements.weatherRotator.hidden = true;
        return;
      }

      const clock = getActiveWeatherClock();
      const option = getWeatherOption(clock);
      const cached = option ? weatherCache.get(option.zone) : null;
      const weather = cached?.data;

      elements.weatherRotator.hidden = false;
      elements.weatherPlace.textContent = `${clock.label} weather`;
      elements.weatherIndex.textContent = `${weatherRotationIndex + 1}/${state.worldClocks.length}`;

      if (weather) {
        const precipitationText = Number.isFinite(weather.precipitationChance)
          ? `rain ${weather.precipitationChance}%`
          : "rain --";

        elements.weatherIcon.textContent = weather.icon;
        elements.weatherSummary.textContent = `${formatTemperature(weather.temperature)} · ${weather.condition}`;
        elements.weatherDetail.textContent = `Feels ${formatTemperature(weather.apparent)} · H ${formatTemperature(weather.high)} / L ${formatTemperature(weather.low)} · ${precipitationText}`;
        return;
      }

      elements.weatherIcon.textContent = cached?.status === "error" ? "Offline" : "--";
      elements.weatherSummary.textContent = cached?.status === "error" ? "Forecast unavailable" : "Forecast loading";
      elements.weatherDetail.textContent = cached?.status === "error"
        ? "Weather loads online from Open-Meteo"
        : "Current weather and today forecast";
    }

    async function refreshWeather({ force = false } = {}) {
      if (!state.showWorld) {
        return;
      }

      const options = normalizeWorldClocks(state.worldClocks)
        .map(getWeatherOption)
        .filter(Boolean);

      renderWeatherCard();
      await Promise.all(options.map((option) => fetchWeather(option, { force })));
    }

    function rotateWeather() {
      if (!state.showWorld || !state.worldClocks.length) {
        return;
      }

      weatherRotationIndex = (weatherRotationIndex + 1) % state.worldClocks.length;
      renderWeatherCard();
      const option = getWeatherOption(getActiveWeatherClock());

      if (option) {
        fetchWeather(option);
      }
    }

    function getLocalTimeZone() {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || "Local time";
    }

    function formatRegionName(zone) {
      const option = getTimezoneOption(zone);

      if (option) {
        return option.label;
      }

      return zone
        .split("/")
        .slice(-2)
        .join(" · ")
        .replace(/_/g, " ");
    }

    function formatGMTOffset(date) {
      const totalMinutes = -date.getTimezoneOffset();
      const sign = totalMinutes >= 0 ? "+" : "-";
      const absoluteMinutes = Math.abs(totalMinutes);
      const hours = Math.floor(absoluteMinutes / 60);
      const minutes = absoluteMinutes % 60;

      return minutes
        ? `GMT${sign}${hours}:${String(minutes).padStart(2, "0")}`
        : `GMT${sign}${hours}`;
    }

    function renderLocalZone(now = new Date()) {
      const localZone = getLocalTimeZone();
      elements.localZone.textContent = `Local time · ${formatRegionName(localZone)} · ${formatGMTOffset(now)}`;
    }

    function revokeBackgroundUrl() {
      if (!backgroundUrl) {
        return;
      }

      URL.revokeObjectURL(backgroundUrl);
      backgroundUrl = "";
    }

    function renderCustomBackground(media) {
      revokeBackgroundUrl();
      elements.mediaBackground.replaceChildren();

      if (!media || !media.blob) {
        elements.app.classList.remove("has-custom-background");
        updateBackgroundControls();
        return;
      }

      backgroundUrl = URL.createObjectURL(media.blob);
      const mediaType = media.type || "";
      const isVideo = mediaType.startsWith("video/");
      const mediaElement = document.createElement(isVideo ? "video" : "img");

      mediaElement.src = backgroundUrl;

      if (isVideo) {
        mediaElement.autoplay = true;
        mediaElement.loop = true;
        mediaElement.muted = true;
        mediaElement.playsInline = true;
        mediaElement.setAttribute("playsinline", "");
        mediaElement.addEventListener("canplay", () => {
          mediaElement.play().catch(() => {});
        }, { once: true });
      } else {
        mediaElement.alt = "";
      }

      elements.mediaBackground.append(mediaElement);
      elements.app.classList.add("has-custom-background");
      updateBackgroundControls();
    }

    function openBackgroundDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(backgroundDbName, 1);

        request.onupgradeneeded = () => {
          request.result.createObjectStore(backgroundStoreName);
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function writeStoredBackground(file) {
      const db = await openBackgroundDb();

      return new Promise((resolve, reject) => {
        const transaction = db.transaction(backgroundStoreName, "readwrite");
        const store = transaction.objectStore(backgroundStoreName);

        store.put({
          blob: file,
          name: file.name,
          type: file.type
        }, backgroundStoreKey);

        transaction.oncomplete = () => {
          db.close();
          resolve();
        };

        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
    }

    async function readStoredBackground() {
      const db = await openBackgroundDb();

      return new Promise((resolve, reject) => {
        const transaction = db.transaction(backgroundStoreName, "readonly");
        const request = transaction.objectStore(backgroundStoreName).get(backgroundStoreKey);

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
    }

    async function deleteStoredBackground() {
      const db = await openBackgroundDb();

      return new Promise((resolve, reject) => {
        const transaction = db.transaction(backgroundStoreName, "readwrite");

        transaction.objectStore(backgroundStoreName).delete(backgroundStoreKey);
        transaction.oncomplete = () => {
          db.close();
          resolve();
        };

        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
    }

    async function restoreStoredBackground({ activate = state.backgroundChoice === "custom" } = {}) {
      try {
        const media = await readStoredBackground();

        if (!media || !media.blob) {
          state.backgroundName = "";
          state.backgroundType = "";

          if (state.backgroundChoice === "custom") {
            state.backgroundChoice = "lofi";
          }

          saveSettings();
          applyBackgroundChoice();
          return;
        }

        state.backgroundName = media.name || "";
        state.backgroundType = media.type || "";
        if (activate) {
          state.backgroundChoice = "custom";
          elements.app.classList.remove(...backgroundClasses);
          elements.app.classList.add("background-custom");
          elements.libraryScene.replaceChildren();
          renderCustomBackground(media);
        } else {
          updateBackgroundControls();
        }

        populateBackgroundSelect();
        saveSettings();
      } catch (error) {
        console.warn("Could not restore the custom background.", error);
        updateBackgroundControls();
      }
    }

    async function setBackgroundFile(file) {
      const fileType = file ? file.type || "" : "";

      if (!file || (!fileType.startsWith("image/") && !fileType.startsWith("video/"))) {
        return;
      }

      state.backgroundName = file.name;
      state.backgroundType = file.type;
      state.backgroundChoice = "custom";
      saveSettings();
      elements.app.classList.remove(...backgroundClasses);
      elements.app.classList.add("background-custom");
      elements.libraryScene.replaceChildren();
      renderCustomBackground({
        blob: file,
        name: file.name,
        type: file.type
      });
      populateBackgroundSelect();

      try {
        await writeStoredBackground(file);
      } catch (error) {
        console.warn("The custom background is active for this session, but could not be saved.", error);
      }
    }

    async function clearCustomBackground() {
      state.backgroundName = "";
      state.backgroundType = "";
      if (state.backgroundChoice === "custom") {
        state.backgroundChoice = "lofi";
      }
      saveSettings();
      renderCustomBackground(null);
      applyBackgroundChoice();

      try {
        await deleteStoredBackground();
      } catch (error) {
        console.warn("Could not remove the stored custom background.", error);
      }
    }

    function renderTime() {
      const now = new Date();
      let hours = now.getHours();
      const period = hours >= 12 ? "PM" : "AM";

      if (!state.use24h) {
        hours = hours % 12 || 12;
      }

      const pieces = [
        String(hours).padStart(state.use24h ? 2 : 1, "0"),
        String(now.getMinutes()).padStart(2, "0")
      ];

      if (state.showSeconds) {
        pieces.push(String(now.getSeconds()).padStart(2, "0"));
      }

      const timeMarkup = pieces
        .map((piece) => piece.split("").map((digit) => `<span class="digit">${digit}</span>`).join(""))
        .join('<span class="mark">:</span>');

      elements.time.innerHTML = state.use24h
        ? timeMarkup
        : `${timeMarkup}<span class="period">${period}</span>`;

      elements.date.textContent = now.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric"
      });

      renderLocalZone(now);
      renderWorldClocks(now);
    }

    function renderWorldClocks(now = new Date()) {
      state.worldClocks = normalizeWorldClocks(state.worldClocks);
      elements.worldClocks.replaceChildren(...state.worldClocks.map((clock) => {
        const article = document.createElement("article");
        const label = document.createElement("div");
        const timeElement = document.createElement("div");
        const dateElement = document.createElement("div");
        const time = new Intl.DateTimeFormat(undefined, {
          timeZone: clock.zone,
          hour: "numeric",
          minute: "2-digit",
          hour12: !state.use24h
        }).format(now);
        const date = new Intl.DateTimeFormat(undefined, {
          timeZone: clock.zone,
          weekday: "short",
          month: "short",
          day: "numeric",
          timeZoneName: "short"
        }).format(now);

        article.className = "zone-clock";
        label.className = "zone-label";
        timeElement.className = "zone-time";
        dateElement.className = "zone-date";
        label.textContent = clock.label;
        timeElement.textContent = time;
        dateElement.textContent = date;
        article.append(label, timeElement, dateElement);

        return article;
      }));
    }

    function resizeCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      seedStars();
    }

    function seedStars() {
      stars.length = 0;
      const count = Math.max(80, Math.round((width * height) / 10500));

      for (let index = 0; index < count; index += 1) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.35 + 0.22,
          alpha: Math.random() * 0.52 + 0.18,
          speed: Math.random() * 0.018 + 0.004,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function getGlowColor(variable) {
      return getComputedStyle(document.documentElement).getPropertyValue(variable).trim() || "99, 226, 255";
    }

    function drawNight(time = 0) {
      const seconds = time / 1000;
      const glowA = getGlowColor("--glow-a");
      const glowB = getGlowColor("--glow-b");

      context.clearRect(0, 0, width, height);

      const sweep = context.createLinearGradient(0, 0, width, height);
      sweep.addColorStop(0, `rgba(${glowA}, 0)`);
      sweep.addColorStop(0.44, `rgba(${glowB}, ${prefersReducedMotion ? 0.08 : 0.12})`);
      sweep.addColorStop(0.56, `rgba(${glowA}, ${prefersReducedMotion ? 0.06 : 0.1})`);
      sweep.addColorStop(1, `rgba(${glowB}, 0)`);

      context.save();
      context.translate(width / 2, height / 2);
      context.rotate(prefersReducedMotion ? 0.2 : seconds * 0.018);
      context.translate(-width / 2, -height / 2);
      context.fillStyle = sweep;
      context.fillRect(-width * 0.25, -height * 0.25, width * 1.5, height * 1.5);
      context.restore();

      context.save();
      context.globalCompositeOperation = "screen";
      stars.forEach((star) => {
        const twinkle = prefersReducedMotion ? 0.72 : 0.5 + Math.sin(seconds * star.speed * 14 + star.phase) * 0.5;
        context.beginPath();
        context.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        context.fillStyle = `rgba(230, 249, 255, ${star.alpha * (0.35 + twinkle * 0.65)})`;
        context.fill();
      });
      context.restore();

      if (!prefersReducedMotion) {
        requestAnimationFrame(drawNight);
      }
    }

    function updateDrift() {
      if (prefersReducedMotion) {
        return;
      }

      const x = (Math.random() * 2 - 1) * 16;
      const y = (Math.random() * 2 - 1) * 12;
      elements.stage.style.setProperty("--drift-x", `${x}px`);
      elements.stage.style.setProperty("--drift-y", `${y}px`);
    }

    function showControls() {
      elements.app.classList.remove("is-idle");
      clearTimeout(idleTimer);
      idleTimer = window.setTimeout(() => {
        if (document.activeElement && elements.controls.contains(document.activeElement)) {
          showControls();
          return;
        }

        elements.app.classList.add("is-idle");
      }, document.fullscreenElement ? 1200 : 3400);
    }

    function updateFullscreenButton() {
      const isFullscreen = Boolean(document.fullscreenElement);

      elements.app.classList.toggle("share-mode", isFullscreen);
      elements.fullscreenButton.setAttribute("aria-pressed", String(isFullscreen));
      elements.fullscreenButton.title = isFullscreen
        ? "Exit screen share fullscreen"
        : "Screen share fullscreen";
      elements.fullscreenButton.setAttribute("aria-label", elements.fullscreenButton.title);
    }

    async function toggleShareFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        console.warn("Fullscreen is not available in this browser context.", error);
      } finally {
        updateFullscreenButton();
        showControls();
      }
    }

    function setTheme(theme) {
      state.theme = theme;
      saveSettings();
      applySettings();
    }

    function toggleAudio() {
      if (!audio) {
        audio = createAudioEngine();
      }

      audio.toggle();
      updateAudioButton();
    }

    function updateAudioButton() {
      if (!audio || !audio.isPlaying()) {
        elements.audioButton.textContent = "▶";
        elements.audioButton.title = "Play sleep sound";
        elements.audioButton.setAttribute("aria-label", "Play sleep sound");
        elements.audioButton.setAttribute("aria-pressed", "false");
        return;
      }

      elements.audioButton.textContent = "Ⅱ";
      elements.audioButton.title = "Pause sleep sound";
      elements.audioButton.setAttribute("aria-label", "Pause sleep sound");
      elements.audioButton.setAttribute("aria-pressed", "true");
    }

    function createAudioEngine() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const master = ctx.createGain();
      const nodes = new Set();
      let playing = false;

      master.gain.value = 0;
      master.connect(ctx.destination);

      function makeNoiseBuffer() {
        const buffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0;

        for (let i = 0; i < data.length; i += 1) {
          const white = Math.random() * 2 - 1;
          lastOut = (lastOut + 0.025 * white) / 1.025;
          data[i] = lastOut * 3.5;
        }

        return buffer;
      }

      function sourceFromNoise() {
        const source = ctx.createBufferSource();
        source.buffer = makeNoiseBuffer();
        source.loop = true;
        nodes.add(source);
        return source;
      }

      function clear() {
        nodes.forEach((node) => {
          try {
            node.stop();
          } catch {
            // Node was already stopped.
          }
        });
        nodes.clear();
      }

      function connectWaves() {
        const source = sourceFromNoise();
        const lowpass = ctx.createBiquadFilter();
        const swell = ctx.createGain();
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();

        lowpass.type = "lowpass";
        lowpass.frequency.value = 620;
        lowpass.Q.value = 0.8;
        swell.gain.value = 0.42;
        lfo.frequency.value = 0.075;
        lfoGain.gain.value = 0.22;

        lfo.connect(lfoGain);
        lfoGain.connect(swell.gain);
        source.connect(lowpass);
        lowpass.connect(swell);
        swell.connect(master);

        nodes.add(lfo);
        source.start();
        lfo.start();
      }

      function connectRain() {
        const source = sourceFromNoise();
        const highpass = ctx.createBiquadFilter();
        const band = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        highpass.type = "highpass";
        highpass.frequency.value = 950;
        band.type = "bandpass";
        band.frequency.value = 3900;
        band.Q.value = 0.55;
        gain.gain.value = 0.34;

        source.connect(highpass);
        highpass.connect(band);
        band.connect(gain);
        gain.connect(master);
        source.start();
      }

      function connectHush() {
        const source = sourceFromNoise();
        const lowpass = ctx.createBiquadFilter();
        const gain = ctx.createGain();

        lowpass.type = "lowpass";
        lowpass.frequency.value = 360;
        lowpass.Q.value = 0.6;
        gain.gain.value = 0.52;

        source.connect(lowpass);
        lowpass.connect(gain);
        gain.connect(master);
        source.start();
      }

      function connectDream() {
        const chord = [146.83, 220, 277.18, 369.99];
        const padGain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        padGain.gain.value = 0.08;
        filter.type = "lowpass";
        filter.frequency.value = 860;
        filter.Q.value = 0.2;
        padGain.connect(filter);
        filter.connect(master);

        chord.forEach((frequency, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const pan = ctx.createStereoPanner();

          osc.type = index % 2 ? "sine" : "triangle";
          osc.frequency.value = frequency;
          gain.gain.value = 0.08;
          pan.pan.value = [-0.45, -0.12, 0.18, 0.42][index];
          osc.connect(gain);
          gain.connect(pan);
          pan.connect(padGain);
          nodes.add(osc);
          osc.start();
        });

        const source = sourceFromNoise();
        const noiseGain = ctx.createGain();
        const noiseFilter = ctx.createBiquadFilter();
        noiseFilter.type = "lowpass";
        noiseFilter.frequency.value = 220;
        noiseGain.gain.value = 0.11;
        source.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(master);
        source.start();
      }

      function startSound() {
        clear();

        if (state.sound === "rain") {
          connectRain();
        } else if (state.sound === "hush") {
          connectHush();
        } else if (state.sound === "dream") {
          connectDream();
        } else {
          connectWaves();
        }
      }

      return {
        toggle() {
          if (playing) {
            playing = false;
            master.gain.cancelScheduledValues(ctx.currentTime);
            master.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.7);
            window.setTimeout(clear, 760);
            return;
          }

          playing = true;
          startSound();
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.setValueAtTime(0, ctx.currentTime);
          master.gain.linearRampToValueAtTime(Number(state.volume), ctx.currentTime + 1.8);

          ctx.resume().catch(() => {
            playing = false;
            clear();
            updateAudioButton();
          });
        },
        changeSound() {
          if (playing) {
            startSound();
          }
        },
        setVolume(value) {
          master.gain.cancelScheduledValues(ctx.currentTime);
          master.gain.linearRampToValueAtTime(value, ctx.currentTime + 0.12);
        },
        isPlaying() {
          return playing;
        }
      };
    }

    document.querySelectorAll(".theme-button").forEach((button) => {
      button.addEventListener("click", () => setTheme(button.dataset.theme));
    });

    elements.fullscreenButton.addEventListener("click", toggleShareFullscreen);
    document.addEventListener("fullscreenchange", updateFullscreenButton);

    elements.brightness.addEventListener("input", (event) => {
      state.brightness = Number(event.target.value);
      saveSettings();
      applySettings();
    });

    elements.formatButton.addEventListener("click", () => {
      state.use24h = !state.use24h;
      saveSettings();
      applySettings();
    });

    elements.secondsButton.addEventListener("click", () => {
      state.showSeconds = !state.showSeconds;
      saveSettings();
      applySettings();
    });

    elements.dateButton.addEventListener("click", () => {
      state.showDate = !state.showDate;
      saveSettings();
      applySettings();
    });

    elements.awayButton.addEventListener("click", () => {
      state.showAway = !state.showAway;
      saveSettings();
      applySettings();
    });

    elements.worldButton.addEventListener("click", () => {
      state.showWorld = !state.showWorld;
      saveSettings();
      applySettings();

      if (state.showWorld) {
        refreshWeather();
      }
    });

    elements.zonePickerList.addEventListener("change", (event) => {
      if (!event.target.matches(".zone-select")) {
        return;
      }

      setWorldClock(Number(event.target.dataset.zoneIndex), event.target.value);
    });

    elements.zonePickerList.addEventListener("click", (event) => {
      const removeButton = event.target.closest(".zone-remove");

      if (!removeButton) {
        return;
      }

      removeWorldClock(Number(removeButton.dataset.zoneIndex));
    });

    elements.addZoneButton.addEventListener("click", addWorldClock);

    elements.backgroundSelect.addEventListener("change", (event) => {
      const choice = event.target.value;

      if (choice === "custom") {
        restoreStoredBackground({ activate: true });
        return;
      }

      state.backgroundChoice = choice;
      saveSettings();
      applySettings();
    });

    elements.backgroundButton.addEventListener("click", () => {
      elements.backgroundInput.click();
    });

    elements.backgroundInput.addEventListener("change", (event) => {
      const [file] = event.target.files;

      setBackgroundFile(file);
      event.target.value = "";
    });

    elements.clearBackgroundButton.addEventListener("click", clearCustomBackground);

    elements.audioButton.addEventListener("click", toggleAudio);

    elements.soundSelect.addEventListener("change", (event) => {
      state.sound = event.target.value;
      saveSettings();

      if (audio) {
        audio.changeSound();
      }
    });

    elements.volume.addEventListener("input", (event) => {
      state.volume = Number(event.target.value);
      saveSettings();

      if (audio) {
        audio.setVolume(state.volume);
      }
    });

    elements.messageInput.addEventListener("input", (event) => {
      state.message = event.target.value.trim() || defaults.message;
      saveSettings();
      applySettings();
    });

    window.addEventListener("resize", resizeCanvas);
    ["mousemove", "mousedown", "keydown", "touchstart", "focusin"].forEach((eventName) => {
      window.addEventListener(eventName, showControls, { passive: true });
    });

    resizeCanvas();
    applySettings();
    restoreStoredBackground();
    refreshWeather();
    drawNight();
    renderTime();
    updateFullscreenButton();
    showControls();

    setInterval(renderTime, 500);
    setInterval(rotateWeather, 10000);
    setInterval(refreshWeather, 30 * 60 * 1000);
    setInterval(updateDrift, 180000);
    window.setTimeout(updateDrift, 3000);
  </script>
</body>
</html>
